definitions:
  environment:
    vars:
      WORK_DIR: "LiveDemo"
      XCODE_WORKSPACE: "LiveDemo.xcworkspace"
      XCODE_SCHEME: "LiveDemo"
      BUNDLE_ID: "com.fd.kuailiao"
      PROVISIONING_PROFILE: "com.fd.kuailiao.mobileprovision"
      FASTLANE_USER: $APPLE_ID
      FASTLANE_PASSWORD: $APPLE_PASSWORD
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
  caches:
    cocoapods_cache:
      - ~/.cocoapods

workflows:
  ios-build-ad-hoc:
    name: iOS Build - Ad Hoc (测试/TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Setup signing
        script: |
          # 使用fastlane match获取证书
          gem install fastlane
          
          # 获取Ad Hoc证书
          fastlane match adhoc --readonly --git_url=$MATCH_GIT_URL --git_basic_authorization=$(echo -n "$GIT_USER:$GIT_TOKEN" | base64) --git_branch=$MATCH_GIT_BRANCH || true
      - name: Install CocoaPods dependencies
        script: |
          pod install --repo-update --project-directory=LiveDemo
      - name: Build and Archive
        script: |
          xcodebuild archive \
            -workspace LiveDemo/$XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath LiveDemo/build/LiveDemo.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic
      - name: Export Ad Hoc IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath LiveDemo/build/LiveDemo.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath LiveDemo/build/
      - name: Rename IPA
        script: |
          mv LiveDemo/build/*.ipa "LiveDemo-$(date +%Y%m%d-%H%M%S).ipa" || true
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-build-appstore:
    name: iOS Build - App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Setup signing
        script: |
          gem install fastlane
          fastlane match appstore --readonly --git_url=$MATCH_GIT_URL --git_basic_authorization=$(echo -n "$GIT_USER:$GIT_TOKEN" | base64) --git_branch=$MATCH_GIT_BRANCH || true
      - name: Install CocoaPods dependencies
        script: |
          pod install --repo-update --project-directory=LiveDemo
      - name: Build and Archive
        script: |
          xcodebuild archive \
            -workspace LiveDemo/$XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath LiveDemo/build/LiveDemo.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic
      - name: Export App Store IPA
        script: |
          # 修改ExportOptions.plist中的method为app-store
          xcodebuild -exportArchive \
            -archivePath LiveDemo/build/LiveDemo.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath LiveDemo/build/
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-test:
    name: iOS Unit Tests
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install --repo-update --project-directory=LiveDemo
      - name: Run unit tests
        script: |
          xcodebuild test \
            -workspace LiveDemo/$XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath LiveDemo/build/DerivedData
    artifacts:
      - LiveDemo/build/DerivedData/Logs/Test/*.xcresult/**
