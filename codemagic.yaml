definitions:
  environment:
    vars:
      WORK_DIR: "LiveDemo"
      XCODE_WORKSPACE: "LiveDemo.xcworkspace"
      XCODE_SCHEME: "LiveDemo"
      BUNDLE_ID: "com.fd.kuailiao"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
  caches:
    cocoapods_cache:
      - ~/.cocoapods
  scripts:
    install_pods: &install_pods
      name: Install CocoaPods dependencies
      script: |
        set -e
        echo "PWD=$(pwd)"
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found under current directory"
          pwd
          ls -la
          ls -la LiveDemo || true
          ls -la LiveDemo/LiveDemo || true
          exit 1
        fi
        echo "Using APP_DIR=$APP_DIR"
        cd "$APP_DIR"
        find . -name '.DS_Store' -delete || true
        find . -name '._*' -delete || true
        if [ -d "Pods" ] && [ -f "Pods/Manifest.lock" ] && cmp -s "Podfile.lock" "Pods/Manifest.lock"; then
          echo "Pods are already in sync, skipping pod install"
        else
          echo "Pods are missing or out of sync, running pod install"
          pod install
        fi

        WECHAT_LIB="Pods/mob_sharesdk/ShareSDK/Support/PlatformSDK/WeChatSDKFull/libWeChatSDK.a"
        WEIBO_LIB="Pods/mob_sharesdk/ShareSDK/Support/PlatformSDK/SinaWeiboSDK/libWeiboSDK.a"
        if [ ! -f "$WECHAT_LIB" ]; then
          echo "Missing required library: $WECHAT_LIB"
          find Pods/mob_sharesdk -maxdepth 6 -iname '*wechat*' -o -iname 'libWeChatSDK.a' || true
          exit 1
        fi
        if [ ! -f "$WEIBO_LIB" ]; then
          echo "Missing required library: $WEIBO_LIB"
          find Pods/mob_sharesdk -maxdepth 6 -iname '*weibo*' -o -iname 'libWeiboSDK.a' || true
          exit 1
        fi
    setup_signing: &setup_signing
      name: Set up code signing settings on Xcode project
      script: |
        set -e
        REPO_ROOT=$(pwd)
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found, cannot configure signing"
          exit 1
        fi
        PROFILE_ARGS=()
        LOCAL_PROFILE=$(find "$REPO_ROOT" -maxdepth 2 -type f -name '*.mobileprovision' | head -n1)
        if [ -n "$LOCAL_PROFILE" ]; then
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$LOCAL_PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          PROFILE_ARGS+=(--profile "$LOCAL_PROFILE")
          echo "Using local provisioning profile: $LOCAL_PROFILE"
        fi
        cd "$APP_DIR"
        EXPORT_OPTIONS_PATH="$HOME/export_options.plist"
        xcode-project use-profiles \
          "${PROFILE_ARGS[@]}" \
          --archive-method="$XCODE_ARCHIVE_METHOD" \
          --custom-export-options="$XCODE_CUSTOM_EXPORT_OPTIONS" \
          --export-options-plist "$EXPORT_OPTIONS_PATH" \
          --code-signing-setup-verbose-logging
        if [ ! -f "$EXPORT_OPTIONS_PATH" ]; then
          echo "Generated export options plist not found: $EXPORT_OPTIONS_PATH"
          exit 1
        fi
    build_archive: &build_archive
      name: Build and Archive
      script: |
        set -e
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found, cannot build"
          exit 1
        fi
        XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
        XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
        echo "Building from APP_DIR=$APP_DIR"
        echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
        cd "$APP_DIR"
        if [ ! -d "$XCODE_WORKSPACE" ]; then
          echo "Workspace not found: $XCODE_WORKSPACE"
          ls -la
          exit 1
        fi
        xcodebuild archive \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -archivePath build/LiveDemo.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates

workflows:
  ios-build-ad-hoc:
    name: iOS Build - Ad Hoc (测试/TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.fd.kuailiao
      vars:
        XCODE_WORKSPACE: "LiveDemo.xcworkspace"
        XCODE_SCHEME: "LiveDemo"
        CERTIFICATE_PASSWORD: "123"
        XCODE_ARCHIVE_METHOD: "ad-hoc"
        XCODE_CUSTOM_EXPORT_OPTIONS: '{"method":"release-testing","signingStyle":"automatic","stripSwiftSymbols":true,"uploadBitcode":false,"uploadSymbols":true}'
    scripts:
      - *install_pods
      - *setup_signing
      - *build_archive
      - name: Export Ad Hoc IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot export"
            exit 1
          fi
          EXPORT_OPTIONS="$HOME/export_options.plist"
          if [ ! -f "$EXPORT_OPTIONS" ]; then
            echo "Generated export options plist not found: $EXPORT_OPTIONS"
            exit 1
          fi
          echo "Exporting from APP_DIR=$APP_DIR using $EXPORT_OPTIONS"
          cd "$APP_DIR"
          xcodebuild -exportArchive \
            -archivePath build/LiveDemo.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/
      - name: Rename IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot rename IPA"
            exit 1
          fi
          echo "Renaming IPA from APP_DIR=$APP_DIR/build"
          cd "$APP_DIR/build"
          mv *.ipa "LiveDemo-$(date +%Y%m%d-%H%M%S).ipa" || true
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-build-appstore:
    name: iOS Build - App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fd.kuailiao
      vars:
        XCODE_WORKSPACE: "LiveDemo.xcworkspace"
        XCODE_SCHEME: "LiveDemo"
        CERTIFICATE_PASSWORD: "123"
        XCODE_ARCHIVE_METHOD: "app-store"
        XCODE_CUSTOM_EXPORT_OPTIONS: '{"method":"app-store","signingStyle":"automatic","stripSwiftSymbols":true,"uploadBitcode":false,"uploadSymbols":true}'
    scripts:
      - *install_pods
      - *setup_signing
      - *build_archive
      - name: Export App Store IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot export"
            exit 1
          fi
          EXPORT_OPTIONS="$HOME/export_options.plist"
          if [ ! -f "$EXPORT_OPTIONS" ]; then
            echo "Generated export options plist not found: $EXPORT_OPTIONS"
            exit 1
          fi
          echo "Exporting from APP_DIR=$APP_DIR using $EXPORT_OPTIONS"
          cd "$APP_DIR"
          xcodebuild -exportArchive \
            -archivePath build/LiveDemo.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-test:
    name: iOS Unit Tests
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - *install_pods
      - name: Run unit tests
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot test"
            exit 1
          fi
          XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
          XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
          echo "Testing from APP_DIR=$APP_DIR"
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
          cd "$APP_DIR"
          if [ ! -d "$XCODE_WORKSPACE" ]; then
            echo "Workspace not found: $XCODE_WORKSPACE"
            ls -la
            exit 1
          fi
          xcodebuild test \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData
    artifacts:
      - LiveDemo/build/DerivedData/Logs/Test/*.xcresult/**
