definitions:
  environment:
    vars:
      WORK_DIR: "LiveDemo"
      XCODE_PROJECT: "LiveDemo.xcodeproj"
      XCODE_WORKSPACE: "LiveDemo.xcworkspace"
      XCODE_SCHEME: "LiveDemo"
      APP_BUNDLE_ID: "com.fd.kuailiao"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
  caches:
    cocoapods_cache:
      - ~/.cocoapods
  scripts:
    install_pods: &install_pods
      name: Install CocoaPods dependencies
      script: |
        set -e
        echo "PWD=$(pwd)"
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found under current directory"
          pwd
          ls -la
          ls -la LiveDemo || true
          ls -la LiveDemo/LiveDemo || true
          exit 1
        fi
        echo "Using APP_DIR=$APP_DIR"
        cd "$APP_DIR"
        find . -name '.DS_Store' -delete || true
        find . -name '._*' -delete || true
        if [ -d "Pods" ] && [ -f "Pods/Manifest.lock" ] && cmp -s "Podfile.lock" "Pods/Manifest.lock"; then
          echo "Pods are already in sync, skipping pod install"
        else
          echo "Pods are missing or out of sync, running pod install"
          pod install
        fi

        WECHAT_LIB="Pods/mob_sharesdk/ShareSDK/Support/PlatformSDK/WeChatSDKFull/libWeChatSDK.a"
        WEIBO_LIB="Pods/mob_sharesdk/ShareSDK/Support/PlatformSDK/SinaWeiboSDK/libWeiboSDK.a"
        if [ ! -f "$WECHAT_LIB" ]; then
          echo "Missing required library: $WECHAT_LIB"
          find Pods/mob_sharesdk -maxdepth 6 -iname '*wechat*' -o -iname 'libWeChatSDK.a' || true
          exit 1
        fi
        if [ ! -f "$WEIBO_LIB" ]; then
          echo "Missing required library: $WEIBO_LIB"
          find Pods/mob_sharesdk -maxdepth 6 -iname '*weibo*' -o -iname 'libWeiboSDK.a' || true
          exit 1
        fi
    setup_signing: &setup_signing
      name: Set up code signing settings on Xcode project
      script: |
        set -e
        REPO_ROOT=$(pwd)
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found, cannot configure signing"
          exit 1
        fi
        EFFECTIVE_BUNDLE_ID="${APP_BUNDLE_ID:-${CM_APP_BUNDLE_ID:-}}"
        XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
        XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
        if [ -z "$EFFECTIVE_BUNDLE_ID" ]; then
          EFFECTIVE_BUNDLE_ID=$(cd "$APP_DIR" && xcodebuild -showBuildSettings -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -configuration Release 2>/dev/null | awk -F ' = ' '/^[[:space:]]*PRODUCT_BUNDLE_IDENTIFIER = / {print $2}' | grep '^com\.' | head -n1)
        fi
        case "$EFFECTIVE_BUNDLE_ID" in
          ""|NO|YES|true|false)
            echo "Unable to resolve a valid bundle id from environment or Xcode build settings"
            exit 1
            ;;
        esac
        if [ -z "$EFFECTIVE_BUNDLE_ID" ]; then
          echo "Unable to resolve bundle id from environment or Xcode build settings"
          exit 1
        fi
        echo "Using bundle id: $EFFECTIVE_BUNDLE_ID"
        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        PROFILE_SCAN_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        LOCAL_PROFILE=$(find "$REPO_ROOT" -maxdepth 2 -type f -name '*.mobileprovision' | head -n1 || true)
        if [ -n "$LOCAL_PROFILE" ]; then
          echo "Found repository provisioning profile fallback: $LOCAL_PROFILE"
        fi
        CANDIDATE_LIST=$(mktemp)
        find "$PROFILE_SCAN_DIR" -maxdepth 1 -type f -name '*.mobileprovision' | sort > "$CANDIDATE_LIST" || true
        if [ -n "$LOCAL_PROFILE" ]; then
          printf '%s\n' "$LOCAL_PROFILE" >> "$CANDIDATE_LIST"
        fi
        if [ ! -s "$CANDIDATE_LIST" ]; then
          echo "No provisioning profiles available after ios_signing setup"
          exit 1
        fi
        EXPECT_DISTRIBUTION_PROFILE=true
        if [ "${XCODE_EXPORT_METHOD}" = "development" ]; then
          EXPECT_DISTRIBUTION_PROFILE=false
        fi
        SELECTED_PROFILE=
        while IFS= read -r CANDIDATE_PROFILE; do
          [ -n "$CANDIDATE_PROFILE" ] || continue
          CANDIDATE_PLIST=$(mktemp)
          if ! security cms -D -i "$CANDIDATE_PROFILE" > "$CANDIDATE_PLIST" 2>/dev/null; then
            rm -f "$CANDIDATE_PLIST"
            continue
          fi
          CANDIDATE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$CANDIDATE_PLIST" 2>/dev/null || true)
          CANDIDATE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$CANDIDATE_PLIST" 2>/dev/null || true)
          CANDIDATE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$CANDIDATE_PLIST" 2>/dev/null || true)
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$CANDIDATE_PLIST" 2>/dev/null || true)
          GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" "$CANDIDATE_PLIST" 2>/dev/null || echo false)
          HAS_PROVISIONED_DEVICES=$(/usr/libexec/PlistBuddy -c "Print :ProvisionedDevices:0" "$CANDIDATE_PLIST" >/dev/null 2>&1 && echo true || echo false)
          HAS_ALL_DEVICES=$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$CANDIDATE_PLIST" 2>/dev/null || echo false)
          echo "Evaluating profile: ${CANDIDATE_NAME:-unknown} (${CANDIDATE_UUID:-no-uuid}) team=${CANDIDATE_TEAM:-unknown} appId=${APP_IDENTIFIER:-unknown} get-task-allow=${GET_TASK_ALLOW} devices=${HAS_PROVISIONED_DEVICES} all-devices=${HAS_ALL_DEVICES}"
          if [ -z "$APP_IDENTIFIER" ]; then
            rm -f "$CANDIDATE_PLIST"
            continue
          fi
          case "$APP_IDENTIFIER" in
            *."$EFFECTIVE_BUNDLE_ID"|"$EFFECTIVE_BUNDLE_ID")
              ;;
            *)
              rm -f "$CANDIDATE_PLIST"
              continue
              ;;
          esac
          if [ "$EXPECT_DISTRIBUTION_PROFILE" = true ] && [ "$GET_TASK_ALLOW" = true ]; then
            rm -f "$CANDIDATE_PLIST"
            continue
          fi
          if [ "$EXPECT_DISTRIBUTION_PROFILE" = true ] && [ "$XCODE_EXPORT_METHOD" = "release-testing" ] && [ "$HAS_PROVISIONED_DEVICES" != true ]; then
            rm -f "$CANDIDATE_PLIST"
            continue
          fi
          if [ "$EXPECT_DISTRIBUTION_PROFILE" = true ] && [ "$XCODE_EXPORT_METHOD" = "app-store" ] && [ "$HAS_PROVISIONED_DEVICES" = true ]; then
            rm -f "$CANDIDATE_PLIST"
            continue
          fi
          SELECTED_PROFILE="$CANDIDATE_PROFILE"
          PROFILE_PLIST="$CANDIDATE_PLIST"
          break
        done < "$CANDIDATE_LIST"
        rm -f "$CANDIDATE_LIST"
        if [ -z "$SELECTED_PROFILE" ]; then
          echo "No provisioning profile matched bundle id $EFFECTIVE_BUNDLE_ID for export method $XCODE_EXPORT_METHOD"
          exit 1
        fi
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
        TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")
        cp "$SELECTED_PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
        echo "Using selected provisioning profile: $SELECTED_PROFILE"
        echo "Resolved profile name: $PROFILE_NAME"
        echo "Resolved profile UUID: $PROFILE_UUID"
        echo "Resolved team id: $TEAM_ID"
        cd "$APP_DIR"
        EXPORT_OPTIONS_PATH="$HOME/export_options.plist"
        cat > "$EXPORT_OPTIONS_PATH" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>${XCODE_EXPORT_METHOD}</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>stripSwiftSymbols</key>
          <true/>
          <key>teamID</key>
          <string>${TEAM_ID}</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>${EFFECTIVE_BUNDLE_ID}</key>
            <string>${PROFILE_NAME}</string>
          </dict>
          <key>uploadBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <true/>
        </dict>
        </plist>
        EOF
        SIGNING_ENV_PATH="$REPO_ROOT/.codemagic-signing.env"
        cat > "$SIGNING_ENV_PATH" <<EOF
        export CM_APP_DIR="$APP_DIR"
        export CM_PROFILE_NAME="$PROFILE_NAME"
        export CM_PROFILE_UUID="$PROFILE_UUID"
        export CM_TEAM_ID="$TEAM_ID"
        export CM_APP_BUNDLE_ID="$EFFECTIVE_BUNDLE_ID"
        export CM_EXPORT_OPTIONS_PATH="$EXPORT_OPTIONS_PATH"
        EOF
        rm -f "$PROFILE_PLIST"
    build_archive: &build_archive
      name: Build and Archive
      script: |
        set -e
        REPO_ROOT=$(pwd)
        SIGNING_ENV_PATH="$REPO_ROOT/.codemagic-signing.env"
        if [ ! -f "$SIGNING_ENV_PATH" ]; then
          echo "Signing environment file not found: $SIGNING_ENV_PATH"
          exit 1
        fi
        . "$SIGNING_ENV_PATH"
        APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
        if [ -z "$APP_DIR" ]; then
          echo "Podfile not found, cannot build"
          exit 1
        fi
        XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
        XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
        echo "Building from APP_DIR=$APP_DIR"
        echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
        cd "$APP_DIR"
        if [ ! -d "$XCODE_WORKSPACE" ]; then
          echo "Workspace not found: $XCODE_WORKSPACE"
          ls -la
          exit 1
        fi
        xcodebuild archive \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -archivePath build/LiveDemo.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM="$CM_TEAM_ID" \
          PROVISIONING_PROFILE_SPECIFIER="$CM_PROFILE_NAME" \
          PROVISIONING_PROFILE="$CM_PROFILE_UUID"

workflows:
  ios-build-ad-hoc:
    name: iOS Build - Ad Hoc (测试/TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.fd.kuailiao
      vars:
        XCODE_WORKSPACE: "LiveDemo.xcworkspace"
        XCODE_SCHEME: "LiveDemo"
        CERTIFICATE_PASSWORD: "123"
        XCODE_EXPORT_METHOD: "release-testing"
    scripts:
      - *install_pods
      - *setup_signing
      - *build_archive
      - name: Export Ad Hoc IPA
        script: |
          set -e
          REPO_ROOT=$(pwd)
          SIGNING_ENV_PATH="$REPO_ROOT/.codemagic-signing.env"
          if [ ! -f "$SIGNING_ENV_PATH" ]; then
            echo "Signing environment file not found: $SIGNING_ENV_PATH"
            exit 1
          fi
          . "$SIGNING_ENV_PATH"
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot export"
            exit 1
          fi
          EXPORT_OPTIONS="$CM_EXPORT_OPTIONS_PATH"
          if [ ! -f "$EXPORT_OPTIONS" ]; then
            echo "Generated export options plist not found: $EXPORT_OPTIONS"
            exit 1
          fi
          echo "Exporting from APP_DIR=$APP_DIR using $EXPORT_OPTIONS"
          cd "$APP_DIR"
          xcodebuild -exportArchive \
            -archivePath build/LiveDemo.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/
      - name: Rename IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot rename IPA"
            exit 1
          fi
          echo "Renaming IPA from APP_DIR=$APP_DIR/build"
          cd "$APP_DIR/build"
          mv *.ipa "LiveDemo-$(date +%Y%m%d-%H%M%S).ipa" || true
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-build-appstore:
    name: iOS Build - App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fd.kuailiao
      vars:
        XCODE_WORKSPACE: "LiveDemo.xcworkspace"
        XCODE_SCHEME: "LiveDemo"
        CERTIFICATE_PASSWORD: "123"
        XCODE_EXPORT_METHOD: "app-store"
    scripts:
      - *install_pods
      - *setup_signing
      - *build_archive
      - name: Export App Store IPA
        script: |
          set -e
          REPO_ROOT=$(pwd)
          SIGNING_ENV_PATH="$REPO_ROOT/.codemagic-signing.env"
          if [ ! -f "$SIGNING_ENV_PATH" ]; then
            echo "Signing environment file not found: $SIGNING_ENV_PATH"
            exit 1
          fi
          . "$SIGNING_ENV_PATH"
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot export"
            exit 1
          fi
          EXPORT_OPTIONS="$CM_EXPORT_OPTIONS_PATH"
          if [ ! -f "$EXPORT_OPTIONS" ]; then
            echo "Generated export options plist not found: $EXPORT_OPTIONS"
            exit 1
          fi
          echo "Exporting from APP_DIR=$APP_DIR using $EXPORT_OPTIONS"
          cd "$APP_DIR"
          xcodebuild -exportArchive \
            -archivePath build/LiveDemo.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/
    artifacts:
      - LiveDemo/build/**/*.ipa

  ios-test:
    name: iOS Unit Tests
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - *install_pods
      - name: Run unit tests
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot test"
            exit 1
          fi
          XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
          XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
          echo "Testing from APP_DIR=$APP_DIR"
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
          cd "$APP_DIR"
          if [ ! -d "$XCODE_WORKSPACE" ]; then
            echo "Workspace not found: $XCODE_WORKSPACE"
            ls -la
            exit 1
          fi
          xcodebuild test \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData
    artifacts:
      - LiveDemo/build/DerivedData/Logs/Test/*.xcresult/**
