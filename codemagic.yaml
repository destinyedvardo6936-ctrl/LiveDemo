  ios-test:
    name: iOS Unit Tests
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          set -e
          echo "PWD=$(pwd)"
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found under current directory"
            pwd
            ls -la
            ls -la LiveDemo || true
            ls -la LiveDemo/LiveDemo || true
            exit 1
          fi
          echo "Using APP_DIR=$APP_DIR"
          cd "$APP_DIR"
          pod install --repo-update
      - name: Run unit tests
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot test"
            exit 1
          fi
          XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
          XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
          echo "Testing from APP_DIR=$APP_DIR"
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
          cd "$APP_DIR"
          if [ ! -d "$XCODE_WORKSPACE" ]; then
            echo "Workspace not found: $XCODE_WORKSPACE"
            ls -la
            exit 1
          fi
          xcodebuild test \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData
    artifacts:
      - LiveDemo/build/DerivedData/Logs/Test/*.xcresult/**
