definitions:
  environment:
    vars:
      WORK_DIR: "LiveDemo"
      XCODE_WORKSPACE: "LiveDemo.xcworkspace"
      XCODE_SCHEME: "LiveDemo"
      BUNDLE_ID: "com.fd.kuailiao"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
  caches:
    cocoapods_cache:
      - ~/.cocoapods

workflows:
  ios-build-ad-hoc:
    name: iOS Build - Ad Hoc (测试/TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "LiveDemo.xcworkspace"
        XCODE_SCHEME: "LiveDemo"
    scripts:
      - name: Install local signing assets
        script: |
          set -e
          CERT_P12=$(find . -maxdepth 2 -name '*.p12' | head -n1)
          PROV_PROFILE=$(find . -maxdepth 2 -name '*.mobileprovision' | head -n1)
          if [ -z "$CERT_P12" ] || [ -z "$PROV_PROFILE" ]; then
            echo "Need a .p12 and a .mobileprovision file in the repo root or its first subdirectories."
            find . -maxdepth 2 -type f \( -name '*.p12' -o -name '*.mobileprovision' \) -print
            exit 1
          fi
          CERT_PASSWORD="${CERT_PASSWORD:-123}"
          if [ -z "$CERT_PASSWORD" ]; then
            echo "CERT_PASSWORD environment variable must be set in CodeMagic or default to 123."
            exit 1
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-codesignpass}"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_P12" -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -s "$PWD/build.keychain" ~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROV_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/
          PROFILE_NAME=$(security cms -D -i "$PROV_PROFILE" | xmllint --xpath 'string(//key[. = "Name"]/following-sibling::string[1])' - 2>/dev/null || true)
          TEAM_ID=$(security cms -D -i "$PROV_PROFILE" | xmllint --xpath 'string(//key[. = "TeamIdentifier"]/following-sibling::array[1]/string[1])' - 2>/dev/null || true)
          if [ -z "$PROFILE_NAME" ]; then
            echo "Cannot read provisioning profile name."
            security cms -D -i "$PROV_PROFILE" > /tmp/profile.plist
            /usr/libexec/PlistBuddy -c 'Print Name' /tmp/profile.plist || true
            exit 1
          fi
          if [ -z "$TEAM_ID" ]; then
            echo "Cannot read TeamIdentifier from provisioning profile."
            exit 1
          fi
          echo "Using signing cert: $CERT_P12"
          echo "Using provisioning profile: $PROV_PROFILE"
          echo "Profile name: $PROFILE_NAME"
          echo "Team ID: $TEAM_ID"
          cat > /tmp/codemagic_signing_env.sh <<EOF
export PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
export DEVELOPMENT_TEAM="$TEAM_ID"
export CODE_SIGN_STYLE=Manual
export CODE_SIGN_IDENTITY="Apple Distribution"
export OTHER_CODE_SIGN_FLAGS="--keychain $PWD/build.keychain"
EOF
          chmod +x /tmp/codemagic_signing_env.sh
      - name: Install CocoaPods dependencies
        script: |
          set -e
          echo "PWD=$(pwd)"
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found under current directory"
            pwd
            ls -la
            ls -la LiveDemo || true
            ls -la LiveDemo/LiveDemo || true
            exit 1
          fi
          echo "Using APP_DIR=$APP_DIR"
          cd "$APP_DIR"
          pod install --repo-update
      - name: Build and Archive
        script: |
          set -e
          source /tmp/codemagic_signing_env.sh || true
          APP_DIR=$(find . -maxdepth 7 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot build"
            exit 1
          fi
          XCODE_WORKSPACE="${XCODE_WORKSPACE:-LiveDemo.xcworkspace}"
          XCODE_SCHEME="${XCODE_SCHEME:-LiveDemo}"
          echo "Building from APP_DIR=$APP_DIR"
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE XCODE_SCHEME=$XCODE_SCHEME"
          cd "$APP_DIR"
          if [ ! -d "$XCODE_WORKSPACE" ]; then
            echo "Workspace not found: $XCODE_WORKSPACE"
            ls -la
            exit 1
          fi
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/LiveDemo.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS="--keychain $PWD/build.keychain"
      - name: Export Ad Hoc IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 5 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot export"
            exit 1
          fi
          EXPORT_OPTIONS=$(find "$APP_DIR" ../.. -maxdepth 5 -type f -name ExportOptions.plist | head -n1)
          if [ -z "$EXPORT_OPTIONS" ]; then
            echo "ExportOptions.plist not found"
            exit 1
          fi
          echo "Exporting from APP_DIR=$APP_DIR using $EXPORT_OPTIONS"
          cd "$APP_DIR"
          xcodebuild -exportArchive \
            -archivePath build/LiveDemo.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/
      - name: Rename IPA
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 5 -type f -name Podfile | head -n1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "Podfile not found, cannot rename IPA"
            exit 1
          fi
          echo "Renaming IPA from APP_DIR=$APP_DIR/build"
          cd "$APP_DIR/build"
          mv *.ipa "LiveDemo-$(date +%Y%m%d-%H%M%S).ipa" || true
    artifacts:
      - LiveDemo/build/**/*.ipa

